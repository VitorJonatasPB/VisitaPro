 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Visitas Corporativas</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0B0F19;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrapper {
            background: #171C29;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 550px;
        }
        .login-brand {
            background: linear-gradient(135deg, #1E2538 0%, #0B0F19 100%);
            color: #ffffff;
            padding: 3rem;
            width: 45%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }
        .login-brand::after {
            content: '';
            position: absolute;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.03" d="M0,160L48,149.3C96,139,192,117,288,133.3C384,149,480,203,576,213.3C672,224,768,192,864,165.3C960,139,1056,117,1152,133.3C1248,149,1344,203,1392,229.3L1440,256L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            bottom: 0;
            left: 0;
            right: 0;
            height: 150px;
            z-index: 1;
        }
        .brand-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            color: #6366F1;
            animation: float 3s ease-in-out infinite;
            z-index: 2;
        }
        .brand-title {
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            z-index: 2;
        }
        .brand-subtitle {
            font-weight: 300;
            opacity: 0.8;
            font-size: 1rem;
            z-index: 2;
        }
        .login-form-container {
            padding: 4rem;
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-title {
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            color: #9CA3AF;
            margin-bottom: 2.5rem;
        }
        .form-floating > label {
            color: #9CA3AF;
        }
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #6366F1;
        }
        .form-control {
            background-color: #1E2538 !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: #ffffff !important;
            border-radius: 10px;
            padding: 1rem 0.75rem;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25);
            border-color: #6366F1 !important;
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1E2538 inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        .btn-login {
            background-color: #6366F1;
            border-color: #6366F1;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background-color: #4f46e5;
            border-color: #4f46e5;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2);
        }
        .forgot-password-link {
            text-decoration: none;
            color: #6366F1;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.3s;
        }
        .forgot-password-link:hover {
            color: #a5b4fc;
            text-decoration: underline;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                margin: 20px;
            }
            .login-brand {
                width: 100%;
                padding: 2rem;
            }
            .brand-icon { font-size: 3.5rem; }
            .login-form-container {
                width: 100%;
                padding: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Lado da Marca (Gradient) -->
        <div class="login-brand">
            <i class="fas fa-map-marked-alt brand-icon"></i>
            <h1 class="brand-title">VisitaPro</h1>
            <p class="brand-subtitle">Gestão Inteligente de Visitas</p>
        </div>
        
        <!-- Lado do Formulário -->
        <div class="login-form-container">
            <h3 class="login-title">Bem-vindo(a) de volta!</h3>
            <p class="login-subtitle">Por favor, insira suas credenciais para acessar o sistema.</p>
            
            <form method="post">
                {% csrf_token %}
                
                {% if form.non_field_errors %}
                    <div class="alert alert-danger shadow-sm border-0 border-start border-danger border-4" style="background-color: rgba(239, 68, 68, 0.1); color: #EF4444;">
                        <i class="fas fa-exclamation-circle me-2"></i> {{ form.non_field_errors }}
                    </div>
                {% endif %}
                
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" name="username" id="username" placeholder="Usuário" required>
                    <label for="username"><i class="fas fa-user me-2"></i>Usuário</label>
                </div>
                
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" name="password" id="password" placeholder="Senha" required>
                    <label for="password"><i class="fas fa-lock me-2"></i>Senha</label>
                </div>
                
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="true" id="remember_me" name="remember_me" style="background-color: #1E2538; border-color: rgba(255, 255, 255, 0.2);">
                        <label class="form-check-label" for="remember_me" style="font-size: 0.85rem; font-weight: 500; color: #6366F1;">
                            Lembrar-me
                        </label>
                    </div>
                    <!-- Link esqueci a senha puxando a cor principal -->
                    <a href="#" class="forgot-password-link" onclick="alert('Funcionalidade de recuperação de senha será ativada em breve. O e-mail SMTP do servidor precisa ser configurado.\n\nContate temporiariamente o administrador para redefinir sua senha.'); return false;">Esqueci minha senha?</a>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-login">
                    Acessar minha conta <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
