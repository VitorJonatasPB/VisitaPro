<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualizar Logo Completa VisitaPro</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #171C29; /* Fundo escuro igual ao do app */
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            background-color: transparent;
            padding: 50px 80px;
            text-align: center;
        }
        h2 {
            color: #9CA3AF;
            margin-bottom: 40px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sua Logo (Idêntica ao ícone do App):</h2>
        
        <svg width="450" height="120" viewBox="0 0 450 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
            </linearGradient>
            
            <linearGradient id="gradText" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
            </linearGradient>

            <filter id="shadowLight" x="-10%" y="-10%" width="120%" height="120%">
              <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.25" />
            </filter>
          </defs>
          
          <g transform="translate(10, 10)">
              <!-- Quadrado arredondado -->
              <rect x="0" y="0" width="100" height="100" rx="25" fill="url(#gradIcon)" filter="url(#shadowLight)"/>
              
              <!-- Pino Branco -->
              <path d="M 50 82 C 50 82 20 48 20 32 A 30 30 0 1 1 80 32 C 80 48 50 82 50 82 Z" fill="#ffffff" />
                    
              <!-- Checkmark / V Vazado -->
              <path d="M 37 32 L 46 44 L 65 21" stroke="url(#gradIcon)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" />
          </g>

          <!-- Texto -->
          <text x="135" y="76" font-family="'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="52" fill="#F8FAFC" letter-spacing="-1">Visita</text>
          <text x="275" y="76" font-family="'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="52" fill="url(#gradText)" letter-spacing="-1">Pro</text>
          <text x="138" y="102" font-family="'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="16" fill="#9CA3AF" letter-spacing="1">GESTÃO DE ROTAS INTELIGENTE</text>
        </svg>

    </div>
</body>
</html>
